name: Fetch Google Scholar metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch metadata
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SCHOLAR_AUTHOR_ID: "BlK2gEAAAAAJ"
          OUTPUT_PATH: data/metadata.json
        run: python scripts/fetch_scholar_metadata.py

      - name: Commit and push metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B metadata
          git add data/metadata.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Scholar metadata"
          git push -f origin metadata
